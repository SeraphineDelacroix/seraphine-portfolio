name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (static)
        run: bun run build
        env:
          NITRO_PRESET: static

      - name: Prepare Pages artifact
        run: |
          # Nitro's static preset emits the prerendered site under .output/public
          OUT_DIR=".output/public"
          if [ ! -d "$OUT_DIR" ]; then
            # Fallback for Vite-only builds
            OUT_DIR="dist"
          fi
          echo "Publishing $OUT_DIR"
          # GitHub Pages SPA fallback so deep links resolve client-side
          if [ -f "$OUT_DIR/index.html" ] && [ ! -f "$OUT_DIR/404.html" ]; then
            cp "$OUT_DIR/index.html" "$OUT_DIR/404.html"
          fi
          touch "$OUT_DIR/.nojekyll"
          echo "OUT_DIR=$OUT_DIR" >> "$GITHUB_ENV"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.OUT_DIR }}

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
